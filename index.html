<head>

<body>
    
    <h1>Reptiles del Uruguay</h1>

    <div id="contenedor-reptiles"></div>

    <!-- MODAL -->

        <div class="modal-contenido">
            <span id="cerrar">&times;</span>
            <h2 id="modal-nombre"></h2>
            
            <!-- Estructura del Carrusel -->
            <div class="carrusel">
                <button class="flecha flecha-izq" id="btn-prev">&#10094;</button>
                <div class="carrusel-visor">
                    <img src="" alt="" id="modal-imagen">
                </div>
                <button class="flecha flecha-der" id="btn-next">&#10095;</button>
            </div>

            <p id="modal-cientifico" class="subtitulo"></p>
            <p id="modal-tipo"><strong>Tipo:</strong> <span></span></p>
            <p id="modal-descripcion"></p>
        </div>
    </div>

    <script src="data/reptiles.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
